version: 2

models:
  - name: fact_flight
    columns:
      - name: flight_id
        data_tests:
          - not_null
          - unique

      - name: flight_number
        data_tests:
          - not_null

      - name: airline_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_airlines')
                field: airline_id

      - name: aircraft_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_aircrafts')
                field: aircraft_id

      - name: origin_airport_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_airport')
                field: airport_id

      - name: destination_airport_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_airport')
                field: airport_id

      - name: scheduled_departure_date_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

      - name: scheduled_departure_time_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_time')
                field: time_id

      - name: scheduled_arrival_date_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

      - name: scheduled_arrival_time_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_time')
                field: time_id

      - name: departure_weather_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_weather_lookup')
                field: weather_id

      - name: arrival_weather_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_weather_lookup')
                field: weather_id

      - name: distance
        data_tests:
          - not_null

      - name: cancelled
        data_tests:
          - not_null

      - name: diverted
        data_tests:
          - not_null
