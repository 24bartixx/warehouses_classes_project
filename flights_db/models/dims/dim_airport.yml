version: 2

models:
  - name: dim_airport
    config:
      contract:
        enforced: true
    columns:
      - name: airport_id
        data_type: BIGINT
        data_tests:
          - not_null
          - unique

      - name: iata_code
        data_type: VARCHAR(3)
        data_tests:
          - not_null
          - unique

      - name: bts_airport_id
        data_type: SMALLINT
        data_tests:
          - not_null
          - unique

      - name: airport_name
        data_type: VARCHAR(100)
        data_tests:
          - not_null
          - unique

      - name: state_name
        data_type: VARCHAR(25)
        data_tests:
          - not_null

      - name: city
        data_type: VARCHAR(50)
        data_tests:
          - not_null

      - name: elevation_range
        data_type: VARCHAR(25)
        data_tests:
          - not_null
          - accepted_values:
              values:
                [
                  "Unknown",
                  "Lowland (0-1000 ft)",
                  "Moderate (1000-3000 ft)",
                  "High (3000-5000 ft)",
                  "Very High (5000+ ft)",
                ]

      - name: latitude_zone
        data_type: VARCHAR(12)
        data_tests:
          - not_null
          - accepted_values:
              values:
                [
                  "South to USA",
                  "Southern USA",
                  "Middle USA",
                  "Northern USA",
                  "Far North",
                  "Unknown",
                ]

      - name: longitude_zone
        data_type: VARCHAR(14)
        data_tests:
          - not_null
          - accepted_values:
              values:
                [
                  "Far West Coast",
                  "West Coast",
                  "Central USA",
                  "East Coast",
                  "Unknown",
                ]
