version: 2

models:
  - name: fact_flight
    config:
      contract:
        enforced: true
      on_schema_change: fail
    columns:
      - name: flight_id
        data_type: BIGINT
        data_tests:
          - not_null
          - unique

      - name: flight_number
        data_type: VARCHAR(5)
        data_tests:
          - not_null

      - name: flight_status_id
        data_type: BIGINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_flight_status')
                field: flight_status_id

      - name: airline_id
        data_type: BIGINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_airline')
                field: airline_id

      - name: aircraft_id
        data_type: BIGINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_aircraft')
                field: aircraft_id

      - name: origin_airport_id
        data_type: BIGINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_airport')
                field: airport_id

      - name: destination_airport_id
        data_type: BIGINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_airport')
                field: airport_id

      - name: scheduled_departure_date_id
        data_type: INTEGER
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

      - name: scheduled_departure_time_id
        data_type: SMALLINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_time')
                field: time_id

      - name: scheduled_arrival_date_id
        data_type: INTEGER
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

      - name: scheduled_arrival_time_id
        data_type: SMALLINT
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_time')
                field: time_id

      - name: departure_weather_id
        data_type: BIGINT
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_weather_lookup')
                field: weather_id

      - name: arrival_weather_id
        data_type: BIGINT
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_weather_lookup')
                field: weather_id

      - name: dept_delay_minutes
        data_type: SMALLINT

      - name: arr_delay_minutes
        data_type: SMALLINT

      - name: air_system_delay_minutes
        data_type: SMALLINT

      - name: security_delay_minutes
        data_type: SMALLINT

      - name: airline_delay_minutes
        data_type: SMALLINT

      - name: late_aircraft_delay_minutes
        data_type: SMALLINT

      - name: weather_delay_minutes
        data_type: SMALLINT

      - name: scheduled_time_minutes
        data_type: SMALLINT

      - name: elapsed_time_minutes
        data_type: SMALLINT

      - name: air_time_minutes
        data_type: SMALLINT

      - name: distance
        data_type: SMALLINT
        data_tests:
          - not_null

      - name: diverted
        data_type: BOOLEAN
        data_tests:
          - not_null

      - name: cancelled
        data_type: BOOLEAN
        data_tests:
          - not_null
